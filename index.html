<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Group Ledger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; 
            --text: #333; --card: #ffffff; --border: #e1e8ed; 
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        body.dark-mode { --primary: #1a252f; --accent: #3498db; --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); transition: background 0.3s; display: flex; }

        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100%; background: var(--primary); color: white; z-index: 2000; box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .nav-item { padding: 18px 20px; cursor: pointer; transition: all 0.3s; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); padding-left: 30px; }
        .nav-item.active-nav { background: var(--accent); border-left: 5px solid #fff; }

        .main { margin-left: 250px; width: calc(100% - 250px); padding: 25px; transition: 0.3s; }
        .burger-menu { display: none; cursor: pointer; font-size: 24px; margin-right: 15px; }

        /* Custom Modal */
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; color: var(--text); }
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

        @media (max-width: 768px) {
            .sidebar { left: -250px; }
            .sidebar.active { left: 0; }
            .main { margin-left: 0; width: 100%; padding: 10px; }
            .burger-menu { display: block !important; }
            .stats-grid { grid-template-columns: 1fr !important; }
            .input-form { grid-template-columns: 1fr !important; }
            .table-wrapper { width: 100%; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
            table { width: 100%; min-width: 600px; }
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; }
        .card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 30px rgba(0,0,0,0.15); }
        .card p { margin: 0; font-size: 1.6rem; font-weight: 800; color: var(--accent); }

        .input-form { background: var(--card); padding: 20px; border-radius: 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; box-shadow: var(--shadow); }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
        .table-wrapper { margin-top: 30px; background: var(--card); border-radius: 16px; box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 15px; color: #64748b; text-transform: uppercase; font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 8px; color: white; font-weight: 600; transition: 0.2s; }
        .btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="padding:20px; font-weight:bold; font-size:1.2rem;">Menu</div>
    <div id="groupList"></div>
</div>

<div class="main">
    <div style="display:flex; align-items:center; margin-bottom:20px; flex-wrap: wrap;">
        <div class="burger-menu" onclick="document.getElementById('sidebar').classList.add('active')">☰</div>
        <h2 id="viewTitle" style="margin:0;">ጠቕላላ መዝገብ</h2>
        <div style="margin-left:auto; display:flex; gap:10px;">
            <button class="btn" style="background:#555" onclick="toggleDarkMode()">🌓</button>
            <button class="btn" style="background:#27ae60" onclick="exportExcel()">📊 Excel</button>
            <button class="btn" style="background:#c0392b" onclick="clearAll()">🗑️ Reset</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card"><h3>ኣታዊ</h3><p id="totalIn">0.00</p></div>
        <div class="card"><h3>ወፃኢ</h3><p id="totalOut">0.00</p></div>
        <div class="card"><h3>ቀራዪ</h3><p id="netBalance">0.00</p></div>
    </div>

    <div class="input-form">
        <input type="number" id="year" placeholder="ዓመት">
        <select id="month"></select>
        <select id="day"></select>
        <select id="groupSelect"></select>
        <input type="text" id="desc" placeholder="መግለፂ" style="grid-column: span 2;">
        <input type="number" id="amount" placeholder="መጠን">
        <button id="typeBtn" class="btn" style="background:green" onclick="toggleType()">ኣታዊ</button>
        <button id="addBtn" class="btn" style="background:#3498db" onclick="saveEntry()">መዝግብ</button>
    </div>

    <div style="margin-top:20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="text" id="searchInput" placeholder="ምድላይ (Search description)..." oninput="render()" style="flex:2; min-width: 200px;">
        <input type="date" id="startDate" onchange="render()" style="flex:1">
        <input type="date" id="endDate" onchange="render()" style="flex:1">
        <button class="btn" style="background:#7f8c8d" onclick="clearDateFilter()">ጽረግ</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>ዕለት</th><th>ጉጅለ</th><th>መግለፂ</th><th>ኣታዊ</th><th>ወፃኢ</th><th>ተግባር</th></tr></thead>
            <tbody id="ledgerBody"></tbody>
        </table>
    </div>
</div>

<div id="customModal">
    <div class="modal-content">
        <p id="modalMsg"></p>
        <div class="modal-btns" id="modalBtns"></div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('ledger')) || [];
    let entryType = 'in', activeFilter = 'ጠቕላላ መዝገብ', editId = null;
    const groups = ['ስራሕ መካየዲ', 'ሬጅመንት 20', 'ሬጅመንት 21', 'ሬጅመንት 22', 'ሬጅመንት 23', 'ሬጅመንት 24','ክ/ሰራዊት ስታፍ','ኮማንድ'];

    // Setup Date Dropdowns
    const now = new Date();
    document.getElementById('year').value = now.getFullYear();
    const months = ["01","02","03","04","05","06","07","08","09","10","11","12"];
    months.forEach(m => document.getElementById('month').innerHTML += `<option value="${m}">${m}</option>`);
    for(let d=1; d<=31; d++) document.getElementById('day').innerHTML += `<option value="${d.toString().padStart(2,'0')}">${d.toString().padStart(2,'0')}</option>`;
    document.getElementById('month').value = (now.getMonth() + 1).toString().padStart(2, '0');
    document.getElementById('day').value = now.getDate().toString().padStart(2, '0');
    
    // Setup Sidebar
    const gList = document.getElementById('groupList');
    gList.innerHTML = `<div class="nav-item active-nav" onclick="filterGroup('ጠቕላላ መዝገብ', this)">ጠቕላላ (All)</div>`;
    groups.forEach(g => {
        gList.innerHTML += `<div class="nav-item" onclick="filterGroup('${g}', this)">${g}</div>`;
        document.getElementById('groupSelect').innerHTML += `<option value="${g}">${g}</option>`;
    });

    function showModal(msg, onConfirm) {
        const modal = document.getElementById('customModal');
        document.getElementById('modalMsg').innerText = msg;
        const btnContainer = document.getElementById('modalBtns');
        btnContainer.innerHTML = '';
        if (onConfirm) {
            const yesBtn = document.createElement('button'); yesBtn.innerText = "እወ"; yesBtn.className = "btn"; yesBtn.style.background = "#c0392b";
            yesBtn.onclick = () => { onConfirm(); modal.style.display = 'none'; };
            const noBtn = document.createElement('button'); noBtn.innerText = "አይ"; noBtn.className = "btn"; noBtn.style.background = "#95a5a6";
            noBtn.onclick = () => modal.style.display = 'none';
            btnContainer.appendChild(noBtn); btnContainer.appendChild(yesBtn);
        } else {
            const okBtn = document.createElement('button'); okBtn.innerText = "እሺ"; okBtn.className = "btn"; okBtn.style.background = "#3498db";
            okBtn.onclick = () => modal.style.display = 'none';
            btnContainer.appendChild(okBtn);
        }
        modal.style.display = 'flex';
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'enabled' : 'disabled'); }
    if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');

    function saveEntry() {
        const amountVal = document.getElementById('amount').value;
        if (!amountVal || parseFloat(amountVal) <= 0) { showModal("በጃኹም ቅኑዕ መጠን ኣእትዉ"); return; }
        const dateStr = `${document.getElementById('year').value}-${document.getElementById('month').value}-${document.getElementById('day').value}`;
        if (editId) {
            data = data.map(i => i.id === editId ? { ...i, group: document.getElementById('groupSelect').value, date: dateStr, desc: document.getElementById('desc').value, amount: parseFloat(amountVal), type: entryType } : i);
            editId = null; document.getElementById('addBtn').innerText = "መዝግብ";
        } else {
            data.push({ id: Date.now(), group: document.getElementById('groupSelect').value, date: dateStr, desc: document.getElementById('desc').value || "ዘይተገልጸ", amount: parseFloat(amountVal), type: entryType });
        }
        localStorage.setItem('ledger', JSON.stringify(data));
        document.getElementById('amount').value = '';
        render();
    }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const tbody = document.getElementById('ledgerBody');
        tbody.innerHTML = '';
        let filtered = data.filter(i => {
            let match = (activeFilter === 'ጠቕላላ መዝገብ' || i.group === activeFilter) && i.desc.toLowerCase().includes(query);
            if (start && i.date < start) match = false;
            if (end && i.date > end) match = false;
            return match;
        });
        let inTotal = 0, outTotal = 0;
        filtered.forEach(item => {
            if(item.type === 'in') inTotal += item.amount; else outTotal += item.amount;
            tbody.innerHTML += `<tr><td>${item.date}</td><td>${item.group}</td><td>${item.desc}</td><td>${item.type=='in'?item.amount:''}</td><td>${item.type=='out'?item.amount:''}</td><td><button onclick="editEntry(${item.id})">✏️</button> <button onclick="del(${item.id})">🗑️</button></td></tr>`;
        });
        document.getElementById('totalIn').innerText = inTotal.toFixed(2);
        document.getElementById('totalOut').innerText = outTotal.toFixed(2);
        document.getElementById('netBalance').innerText = (inTotal - outTotal).toFixed(2);
    }

    function clearDateFilter() { document.getElementById('startDate').value = ''; document.getElementById('endDate').value = ''; render(); }
    function editEntry(id) { const item = data.find(i => i.id === id); editId = id; document.getElementById('groupSelect').value = item.group; document.getElementById('desc').value = item.desc; document.getElementById('amount').value = item.amount; entryType = item.type; document.getElementById('addBtn').innerText = "ኣመሓይሽ"; render(); }
    function del(id) { showModal("ክትስርዞ ትደሊ ዲኻ?", () => { data = data.filter(i => i.id !== id); localStorage.setItem('ledger', JSON.stringify(data)); render(); }); }
    function filterGroup(g, el) { activeFilter = g; document.getElementById('viewTitle').innerText = g; document.getElementById('sidebar').classList.remove('active'); document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav')); if(el) el.classList.add('active-nav'); render(); }
    function toggleType() { entryType = entryType === 'in' ? 'out' : 'in'; document.getElementById('typeBtn').innerText = entryType === 'in' ? 'ኣታዊ' : 'ወፃኢ'; document.getElementById('typeBtn').style.background = entryType === 'in' ? 'green' : 'red'; }
    function exportExcel() { const wb = XLSX.utils.book_new(); const ws = XLSX.utils.json_to_sheet(data); XLSX.utils.book_append_sheet(wb, ws, "Ledger"); XLSX.writeFile(wb, "MyLedger.xlsx"); }
    function clearAll() { showModal("ኩሉ መዝገብ ክትስርዞም ዲኻ?", () => { data = []; localStorage.setItem('ledger', JSON.stringify(data)); render(); }); }
    
    document.addEventListener('click', (e) => { const sidebar = document.getElementById('sidebar'); const burger = document.querySelector('.burger-menu'); if (!sidebar.contains(e.target) && !burger.contains(e.target)) sidebar.classList.remove('active'); });
    render();
</script>
</body>
</html>
